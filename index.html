
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pickleball League Admin</title>
<style>
body{font-family:Arial;margin:40px;background:#f5f7fb}
h1{color:#2c3e50}
section{background:white;padding:20px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{padding:10px 16px;margin-top:10px;background:#2ecc71;color:white;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#27ae60}
input{padding:8px;margin:5px}
table{border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #ddd;padding:8px}
</style>
</head>

<body>

<h1>🎾 Pickleball League Admin</h1>

<section>
<h2>Add Player</h2>
<input id="playerName" placeholder="Player name">
<button onclick="addPlayer()">Add Player</button>
</section>

<section>
<h2>Players</h2>
<table id="playerTable">
<tr><th>#</th><th>Name</th></tr>
</table>
</section>

<section>
<h2>Generate Weekend Schedule</h2>
<button onclick="generateSchedule()">Generate Schedule</button>
<div id="schedule"></div>
</section>

<script>

let players = JSON.parse(localStorage.getItem("players") || "[]")

function renderPlayers(){
let table = document.getElementById("playerTable")
table.innerHTML = "<tr><th>#</th><th>Name</th></tr>"
players.forEach((p,i)=>{
let row = table.insertRow()
row.insertCell(0).innerText = i+1
row.insertCell(1).innerText = p
})
}

function addPlayer(){
let name = document.getElementById("playerName").value
if(!name) return
players.push(name)
localStorage.setItem("players",JSON.stringify(players))
document.getElementById("playerName").value=""
renderPlayers()
}

function generateSchedule(){

let scheduleDiv = document.getElementById("schedule")
scheduleDiv.innerHTML=""

if(players.length < 4){
scheduleDiv.innerHTML="Need at least 4 players"
return
}

for(let i=0;i<players.length;i+=4){

if(players[i+3]){

let match=document.createElement("div")
match.innerHTML=`
<p><b>Match</b>: 
${players[i]} & ${players[i+1]} 
vs 
${players[i+2]} & ${players[i+3]}
</p>`

scheduleDiv.appendChild(match)

}
}

}

renderPlayers()

</script>

</body>
</html>
